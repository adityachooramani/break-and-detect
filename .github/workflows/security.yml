name: security

on:
  push:
  pull_request:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  REPORT_DIR: reports
  IMAGE_NAME: break-and-detect
  APP_PORT: "5000"

jobs:
  gitleaks:
    name: GITLEAKS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}" && chmod 777 "${REPORT_DIR}"

      - name: Run Gitleaks
        run: |
          docker run --rm -v "${PWD}:/repo" ghcr.io/gitleaks/gitleaks:latest \
            detect --source=/repo --no-banner \
            --report-format=sarif \
            --report-path="/repo/${REPORT_DIR}/gitleaks.sarif"
          rc=$?
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi

      - name: Upload Gitleaks SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/gitleaks.sarif
          category: gitleaks

      - name: Upload Gitleaks report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-scan-reports
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: ignore

  bandit:
    name: BANDIT
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit with SARIF support
        run: python -m pip install --upgrade pip "bandit[sarif]"

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Run Bandit
        run: |
          bandit -r . -x .git,venv,.venv,__pycache__,app.db -f sarif -o "${REPORT_DIR}/bandit.sarif"
          rc=$?
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi

      - name: Upload Bandit SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/bandit.sarif
          category: bandit

      - name: Upload Bandit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-scan-reports
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: ignore

  semgrep:
    name: SEMGREP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/default \
            --sarif \
            --output "${REPORT_DIR}/semgrep.sarif" \
            --exclude .git \
            --exclude venv \
            --exclude .venv \
            --exclude __pycache__ \
            --exclude app.db \
            --error
          rc=$?
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi

      - name: Upload Semgrep SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/semgrep.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-scan-reports
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: ignore

  trivy-fs:
    name: TRIVY FILESYSTEM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Run Trivy filesystem scan
        run: |
          docker run --rm \
            -v "${PWD}:/work" \
            -e GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -e TRIVY_DB_REPOSITORY="ghcr.io/aquasecurity/trivy-db" \
            aquasecurity/trivy:0.36.0 fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output "/work/${REPORT_DIR}/trivy-fs.sarif" \
            --exit-code 1 \
            /work
          rc=$?
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy filesystem SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-fs.sarif
          category: trivy-fs

      - name: Upload Trivy filesystem report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-scan-reports
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: ignore

  trivy-image:
    name: TRIVY IMAGE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Build image for Trivy
        run: docker build -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Run Trivy image scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${PWD}:/work" \
            -e GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -e TRIVY_DB_REPOSITORY="ghcr.io/aquasecurity/trivy-db" \
            aquasecurity/trivy:0.36.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --scanners vuln \
            --format sarif \
            --output "/work/${REPORT_DIR}/trivy-image.sarif" \
            --exit-code 1 \
            "${IMAGE_NAME}:${GITHUB_SHA}"
          rc=$?
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy image SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/trivy-image.sarif
          category: trivy-image

      - name: Upload Trivy image report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-scan-reports
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: ignore

  checkov:
    name: CHECKOV
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Checkov
        run: python -m pip install --upgrade pip checkov

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}"

      - name: Run Checkov
        run: >-
          checkov -d .
          --framework dockerfile,github_actions,terraform
          --skip-path app.db
          --output sarif
          --output-file-path "${REPORT_DIR}"
          --soft-fail

      - name: Upload Checkov SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/results_sarif.sarif
          category: checkov

      - name: Upload Checkov report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-scan-reports
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: ignore

  dynamic:
    name: DYNAMIC
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p "${REPORT_DIR}" && chmod 777 "${REPORT_DIR}"

      - name: Generate JWT secret
        id: jwt
        run: echo "value=$(python3 -c 'import secrets; print(secrets.token_hex(32))')" >> "$GITHUB_OUTPUT"

      - name: Build runtime image
        run: docker build -t "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Start application container
        run: |
          docker run -d --rm \
            --name app-under-test \
            -e JWT_SECRET="${{ steps.jwt.outputs.value }}" \
            -p ${APP_PORT}:5000 \
            "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Wait for /health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:${APP_PORT}/health" >/dev/null; then
              echo "service is up"
              exit 0
            fi
            sleep 2
          done
          echo "service did not become healthy; dumping logs"
          docker logs app-under-test || true
          exit 1

      - name: Run OWASP ZAP baseline scan
        run: |
          docker run --rm --network host \
            -v "${PWD}/${REPORT_DIR}:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t "http://127.0.0.1:${APP_PORT}" \
            -J zap.json -w zap.md -r zap.html -m 5 -I || true

      - name: Convert ZAP report to SARIF
        if: always()
        run: |
          if [ -f "${REPORT_DIR}/zap.json" ]; then
            python3 scripts/zap_to_sarif.py "${REPORT_DIR}/zap.json" -o "${REPORT_DIR}/zap.sarif"
          else
            echo "zap.json not found; skipping SARIF conversion"
          fi

      - name: Upload ZAP SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/zap.sarif
          category: zap

      - name: Stop application container
        if: always()
        run: docker rm -f app-under-test || true

      - name: Upload dynamic scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-scan-reports
          path: ${{ env.REPORT_DIR }}
          if-no-files-found: ignore

  gate:
    name: SECURITY GATE
    runs-on: ubuntu-latest
    needs:
      - gitleaks
      - bandit
      - semgrep
      - trivy-fs
      - trivy-image
      - checkov
      - dynamic
    if: always()
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-scan-reports"
          merge-multiple: true
          path: combined-reports

      - name: Consolidate reports and enforce gate
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path

          root = Path("combined-reports")
          out = ["# Consolidated Security Report", "",
                 "| Report | HIGH/CRITICAL | Result |",
                 "| --- | ---: | --- |"]
          failing = []

          def sarif_errors(path):
              try:
                  data = json.loads(Path(path).read_text())
              except Exception:
                  return None
              return sum(
                  1
                  for run in data.get("runs", [])
                  for res in run.get("results", [])
                  if res.get("level") == "error"
              )

          # Security scanners that hard-fail the build on HIGH/CRITICAL.
          gating = [
              "gitleaks.sarif", "bandit.sarif", "semgrep.sarif",
              "trivy-fs.sarif", "trivy-image.sarif",
          ]
          for name in gating:
              hits = list(root.rglob(name))
              if not hits:
                  out.append(f"| {name} | - | not produced |")
                  continue
              n = sarif_errors(hits[0])
              if n is None:
                  out.append(f"| {name} | - | unreadable |")
                  continue
              out.append(f"| {name} | {n} | {'FAIL' if n else 'PASS'} |")
              if n:
                  failing.append(f"{name}: {n} HIGH/CRITICAL result(s)")

          # Checkov IaC findings are advisory only (reported, not gated).
          for m in root.rglob("results_sarif.sarif"):
              n = sarif_errors(m) or 0
              out.append(f"| checkov (advisory) | {n} | INFO |")
              break

          # ZAP high-risk alerts hard-fail the build.
          for m in root.rglob("zap.json"):
              try:
                  data = json.loads(Path(m).read_text())
                  highs = 0
                  for site in data.get("site", []):
                      for alert in site.get("alerts", []):
                          rd = str(alert.get("riskdesc", "")).lower()
                          if rd.startswith("high") or str(alert.get("riskcode", "")) == "3":
                              highs += 1
                  out.append(f"| zap.json | {highs} | {'FAIL' if highs else 'PASS'} |")
                  if highs:
                      failing.append(f"zap.json: {highs} high-risk alert(s)")
              except Exception:
                  out.append("| zap.json | - | unreadable |")
              break

          out.append("")
          if failing:
              out.append("## Gate result: FAILED")
              out += [f"- {x}" for x in failing]
          else:
              out.append("## Gate result: PASSED — no HIGH/CRITICAL findings.")

          Path("consolidated-security-report.md").write_text("\n".join(out) + "\n")
          print("\n".join(out))
          if failing:
              sys.exit(1)
          PY

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-security-report
          path: consolidated-security-report.md
          if-no-files-found: ignore